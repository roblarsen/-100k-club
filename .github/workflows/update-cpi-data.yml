name: Update CPI data

on:
  workflow_dispatch: {}
  schedule:
    # Run monthly on the 2nd day at 12:00 UTC
    - cron: "0 12 2 * *"

permissions:
  contents: write

jobs:
  update-cpi:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: timeline/package-lock.json

      - name: Install deps (timeline)
        working-directory: timeline
        run: npm ci

      - name: Update CPI JSON
        working-directory: timeline
        run: npm run update:cpi

      - name: Commit changes (if any)
        run: |
          git diff --quiet timeline/data/cpi-us.json && echo "No changes to commit" && exit 0

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add timeline/data/cpi-us.json
          git commit -m "chore(timeline): update CPI data [skip ci]"
          git push
